<section class="container">
  <header class="header">
    <h3 i18n>Mis Reservas</h3>
    <button type="button" class="filters-toggle" (click)="toggleFilters()">
      <!-- ícono "filtros" simple -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="22"
        height="22"
        viewBox="0 0 24 24"
        fill="none"
      >
        <path
          d="M4 6h16M7 12h10M10 18h4"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
    </button>
  </header>

  <div class="reservas-cards-wrapper">
    <!-- overlay (solo mobile) -->
    <div class="filters-overlay" [class.open]="isFiltersOpen" (click)="closeFilters()"></div>

    <aside class="sidebar" [class.open]="isFiltersOpen" (click)="$event.stopPropagation()">
      <div class="sidebar-header">
        <h3 i18n>Filtros</h3>
        <button type="button" class="close-btn" (click)="closeFilters()">
          <!-- X -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M6 6l12 12M18 6L6 18"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </div>

      <form [formGroup]="form">
        <app-filter-dropdown>
          <div dropdown-trigger><h3 i18n>Fecha</h3></div>
          <div dropdown-content>
            <div class="form-group">
              <input
                id="fecha"
                type="date"
                formControlName="fecha"
                placeholder="Fecha"
                i18n-placeholder
              />
            </div>
          </div>
        </app-filter-dropdown>
      </form>

      <button (click)="aplicarFiltros(); closeFilters()" class="aplicar-filtros-btn" i18n>
        Aplicar
      </button>
    </aside>

    <section class="cards-wrapper">
      @for (reserva of reservas; track reserva) {
        <article class="card">
          <img class="logo-restaurante-media" [src]="reserva.iconoSrc" />
          <div class="card-body">
            <h4>{{ reserva.razonSocial }} - {{ reserva.nomSucursal }}</h4>
            <h5 class="" i18n>
              Estado:
              <span [class]="obtenerTextoEstadoClassname(reserva.codEstado)">{{
                reserva.estado
              }}</span>
            </h5>
            <h6>{{ formatearFecha(reserva.fechaReserva) }}</h6>
            <h6 i18n>Cantidad de personas: {{ reserva.cantAdultos + reserva.cantMenores }}</h6>
          </div>
        </article>
      }
    </section>
  </div>
</section>
